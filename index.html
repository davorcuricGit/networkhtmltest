<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Test</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#111;font-family:monospace}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#banner{position:fixed;top:16px;right:16px;background:rgba(10,12,20,0.84);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:14px 18px;max-width:260px;color:#fff;z-index:10;pointer-events:none}
#banner h1{font-size:13px;font-weight:700;letter-spacing:2px;color:#fff;margin-bottom:3px}
#banner h2{font-size:10px;font-weight:400;letter-spacing:1px;color:#b0b8cc;margin-bottom:9px}
#banner .author{font-size:9px;letter-spacing:1px;color:#8898b0;margin-bottom:9px}
#banner .socials{display:flex;flex-wrap:wrap;gap:5px;pointer-events:auto}
#banner .socials a{font-size:8px;letter-spacing:1px;color:#c07010;border:1px solid rgba(192,112,16,0.45);border-radius:3px;padding:2px 8px;text-decoration:none}
#banner .socials a:hover{background:rgba(192,112,16,0.15)}
#controls{position:fixed;bottom:16px;left:16px;display:flex;gap:6px;z-index:10}
#controls button{background:rgba(10,12,20,0.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.15);color:#b0b8cc;font-family:monospace;font-size:9px;letter-spacing:1px;padding:5px 10px;border-radius:3px;cursor:pointer;transition:color 0.1s,border-color 0.1s}
#controls button:hover{color:#fff;border-color:rgba(255,255,255,0.35)}
#controls button.active{color:#c07010;border-color:rgba(192,112,16,0.55)}
#card{position:fixed;bottom:16px;right:16px;background:rgba(10,12,20,0.88);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:12px 14px;min-width:180px;max-width:260px;color:#fff;z-index:10;display:none}
#card-title{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px;padding-right:20px;color:#e0e4f0}
#card-close{position:absolute;top:9px;right:11px;cursor:pointer;color:#8898b0;font-size:11px;line-height:1}
#card-close:hover{color:#fff}
#card-attrs{display:flex;flex-direction:column;gap:4px}
.attr-row{display:flex;gap:8px;font-size:9px;letter-spacing:0.5px;align-items:baseline}
.attr-key{color:#7888a8;flex-shrink:0;min-width:60px}
.attr-val{color:#c8d0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="banner">
    <h1>Test</h1>
    <h2>this is a test</h2>
    <div class="author">Not David</div>
    <div class="socials"><a href="https://bsky.app" target="_blank" rel="noopener noreferrer">Bluesy</a></div>
  </div>
<div id="controls">
  <button id="btn-reset">&#x2302; RESET</button>
  <button id="btn-labels">T LABELS</button>
</div>
<div id="card">
  <div id="card-close">&#x2715;</div>
  <div id="card-title"></div>
  <div id="card-attrs"></div>
</div>
<script>
const DATA={"nodes":[{"id":"python","label":"Python","x":-142.91177103111363,"y":-101.90725313771651,"color":"#4488cc","size":10,"attrs":{"domain":"language","stars":"60"}},{"id":"javascript","label":"JavaScript","x":279.2700470043214,"y":-68.30007891652566,"color":"#4488cc","size":10,"attrs":{"domain":"language","stars":"55"}},{"id":"typescript","label":"TypeScript","x":319.65598125618567,"y":14.186573622493418,"color":"#4488cc","size":10,"attrs":{"domain":"language","stars":"48"}},{"id":"rust","label":"Rust","x":-144.42885821101984,"y":-206.36817828603316,"color":"#4488cc","size":10,"attrs":{"domain":"language","stars":"40"}},{"id":"react","label":"React","x":214.22660222903588,"y":13.537529508234744,"color":"#4488cc","size":10,"attrs":{"domain":"framework","stars":"45"}},{"id":"django","label":"Django","x":-53.97376818844486,"y":-51.06794606534975,"color":"#4488cc","size":10,"attrs":{"domain":"framework","stars":"24"}},{"id":"fastapi","label":"FastAPI","x":-136.1629597214354,"y":3.8962024323793716,"color":"#4488cc","size":10,"attrs":{"domain":"framework","stars":"18"}},{"id":"graphql","label":"GraphQL","x":93.16301321052359,"y":42.67920358983378,"color":"#4488cc","size":10,"attrs":{"domain":"framework","stars":"20"}},{"id":"postgres","label":"PostgreSQL","x":-34.34106747619691,"y":53.368440996977434,"color":"#4488cc","size":10,"attrs":{"domain":"database","stars":"35"}},{"id":"redis","label":"Redis","x":-202.37448342426825,"y":84.50154641828621,"color":"#4488cc","size":10,"attrs":{"domain":"database","stars":"22"}},{"id":"docker","label":"Docker","x":-116.58985411898419,"y":141.16340515974989,"color":"#4488cc","size":10,"attrs":{"domain":"devops","stars":"30"}},{"id":"kubernetes","label":"Kubernetes","x":-75.53337300127046,"y":74.31195109338026,"color":"#4488cc","size":10,"attrs":{"domain":"devops","stars":"28"}}],"edges":[{"source":"python","target":"django","directed":true,"weight":0.9},{"source":"python","target":"fastapi","directed":true,"weight":0.85},{"source":"javascript","target":"react","directed":true,"weight":0.95},{"source":"javascript","target":"typescript","directed":false,"weight":0.8},{"source":"typescript","target":"react","directed":true,"weight":0.75},{"source":"react","target":"graphql","directed":true,"weight":0.6},{"source":"django","target":"postgres","directed":true,"weight":0.85},{"source":"fastapi","target":"postgres","directed":true,"weight":0.7},{"source":"fastapi","target":"redis","directed":true,"weight":0.5},{"source":"graphql","target":"postgres","directed":true,"weight":0.55},{"source":"docker","target":"kubernetes","directed":false,"weight":0.9},{"source":"docker","target":"postgres","directed":true,"weight":0.6},{"source":"docker","target":"redis","directed":true,"weight":0.65},{"source":"kubernetes","target":"fastapi","directed":true,"weight":0.4},{"source":"python","target":"rust","directed":false,"weight":0.35}],"bg":{"hex":"#f5f7fa","a":1},"camera":{"x":13.963031294076501,"y":27.538200607761993,"zoom":0.7414253464059907},"meta":{"title":"Test","subtitle":"this is a test","author":"Not David","socials":[{"id":1773444366880,"label":"Bluesy","url":"https://bsky.app"}]}};
(function(){
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var cam={x:DATA.camera.x,y:DATA.camera.y,zoom:DATA.camera.zoom};
var initCam={x:cam.x,y:cam.y,zoom:cam.zoom};
var pan=null,hovered=null,selected=null,showLabels=false;

var nodeMap={};
DATA.nodes.forEach(function(n){nodeMap[n.id]=n;});

function bgCss(){
  var bg=DATA.bg;
  if(!bg)return'#f5f7fa';
  if(typeof bg==='string')return bg;
  var hex=bg.hex||'#f5f7fa',a=bg.a!==undefined?bg.a:1;
  if(a>=1)return hex;
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return'rgba('+r+','+g+','+b+','+a+')';
}

function toSc(wx,wy){
  return[canvas.width/2+(wx+cam.x)*cam.zoom,canvas.height/2+(wy+cam.y)*cam.zoom];
}
function toWo(sx,sy){
  return[(sx-canvas.width/2)/cam.zoom-cam.x,(sy-canvas.height/2)/cam.zoom-cam.y];
}

function draw(){
  ctx.fillStyle=bgCss();
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Edges
  ctx.globalAlpha=0.28;
  DATA.edges.forEach(function(e){
    var s=nodeMap[e.source],t=nodeMap[e.target];
    if(!s||!t)return;
    var sc=toSc(s.x,s.y),tc=toSc(t.x,t.y);
    var sx=sc[0],sy=sc[1],tx=tc[0],ty=tc[1];
    var w=Math.max(0.5,Math.min(4,e.weight||1));
    ctx.strokeStyle='#888';
    ctx.lineWidth=w;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(tx,ty);ctx.stroke();
    if(e.directed){
      var ang=Math.atan2(ty-sy,tx-sx);
      var tr=Math.max(3,(t.size||10)*cam.zoom);
      var ex=tx-Math.cos(ang)*tr,ey=ty-Math.sin(ang)*tr;
      var hl=Math.min(10,tr*0.9);
      ctx.globalAlpha=0.5;
      ctx.beginPath();
      ctx.moveTo(ex,ey);
      ctx.lineTo(ex-hl*Math.cos(ang-Math.PI/6),ey-hl*Math.sin(ang-Math.PI/6));
      ctx.moveTo(ex,ey);
      ctx.lineTo(ex-hl*Math.cos(ang+Math.PI/6),ey-hl*Math.sin(ang+Math.PI/6));
      ctx.stroke();
      ctx.globalAlpha=0.28;
    }
  });
  ctx.globalAlpha=1;

  // Nodes
  DATA.nodes.forEach(function(n){
    var sc=toSc(n.x,n.y),sx=sc[0],sy=sc[1];
    var r=Math.max(2,(n.size||10)*cam.zoom);
    ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fillStyle=n.color||'#4488cc';
    ctx.fill();
    if(n===selected){
      ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();
    } else if(n===hovered){
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;ctx.stroke();
    }
    if(showLabels||(n===hovered&&!selected)||(n===selected)){
      drawLabel(n,sx,sy,r);
    }
  });
}

function drawLabel(n,sx,sy,r){
  var label=n.label||n.id;
  ctx.font='bold 11px monospace';
  var tw=ctx.measureText(label).width;
  var px=5,py=3,th=14;
  var lx=sx+r+6,ly=sy-th/2-py;
  if(lx+tw+px*2>canvas.width-4) lx=sx-r-tw-px*2-6;
  ctx.fillStyle='rgba(10,12,20,0.82)';
  if(ctx.roundRect){
    ctx.beginPath();ctx.roundRect(lx-px,ly,tw+px*2,th+py*2,3);ctx.fill();
  } else {
    ctx.fillRect(lx-px,ly,tw+px*2,th+py*2);
  }
  ctx.fillStyle='#e8edf8';
  ctx.fillText(label,lx,ly+th+py-1);
}

// ── Hit test ─────────────────────────────────────────────────────────────────
function hitNode(sx,sy){
  var wo=toWo(sx,sy),wx=wo[0],wy=wo[1];
  var hit=null,bd=Infinity;
  DATA.nodes.forEach(function(n){
    var d=Math.hypot(n.x-wx,n.y-wy);
    var r=(n.size||10)+6/cam.zoom;
    if(d<r&&d<bd){hit=n;bd=d;}
  });
  return hit;
}

// ── Mouse ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown',function(e){
  if(e.button!==0)return;
  pan={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y,moved:false};
});
canvas.addEventListener('mousemove',function(e){
  if(pan){
    var dx=e.clientX-pan.x,dy=e.clientY-pan.y;
    if(Math.abs(dx)+Math.abs(dy)>3)pan.moved=true;
    cam.x=pan.cx+dx/cam.zoom;cam.y=pan.cy+dy/cam.zoom;
    draw();return;
  }
  var hit=hitNode(e.clientX,e.clientY);
  if(hit!==hovered){hovered=hit;canvas.style.cursor=hit?'pointer':'default';draw();}
});
canvas.addEventListener('mouseup',function(e){
  if(!pan)return;
  if(!pan.moved){
    var hit=hitNode(e.clientX,e.clientY);
    if(hit){selected=hit;showCard(hit);}
    else{selected=null;hideCard();}
    draw();
  }
  pan=null;
});
canvas.addEventListener('mouseleave',function(){pan=null;hovered=null;draw();});
canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  var factor=e.deltaY<0?1.12:1/1.12;
  var wo=toWo(e.clientX,e.clientY);
  cam.zoom=Math.max(0.05,Math.min(50,cam.zoom*factor));
  cam.x=wo[0]-(e.clientX-canvas.width/2)/cam.zoom;
  cam.y=wo[1]-(e.clientY-canvas.height/2)/cam.zoom;
  draw();
},{passive:false});

// ── Touch ────────────────────────────────────────────────────────────────────
var touches={};
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];touches[t.identifier]={x:t.clientX,y:t.clientY};
  }
  if(e.touches.length===1){
    var t0=e.touches[0];
    pan={x:t0.clientX,y:t0.clientY,cx:cam.x,cy:cam.y,moved:false};
  } else {pan=null;}
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===2){
    pan=null;
    var a=e.touches[0],b=e.touches[1];
    var dist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    var pa=touches[a.identifier],pb=touches[b.identifier];
    var prev=pa&&pb?Math.hypot(pa.x-pb.x,pa.y-pb.y):dist;
    var factor=dist/Math.max(prev,1);
    var mx=(a.clientX+b.clientX)/2,my=(a.clientY+b.clientY)/2;
    var wo=toWo(mx,my);
    cam.zoom=Math.max(0.05,Math.min(50,cam.zoom*factor));
    cam.x=wo[0]-(mx-canvas.width/2)/cam.zoom;
    cam.y=wo[1]-(my-canvas.height/2)/cam.zoom;
    for(var i=0;i<e.touches.length;i++){var t=e.touches[i];touches[t.identifier]={x:t.clientX,y:t.clientY};}
    draw();return;
  }
  if(pan&&e.touches.length===1){
    var t1=e.touches[0];
    var dx=t1.clientX-pan.x,dy=t1.clientY-pan.y;
    if(Math.abs(dx)+Math.abs(dy)>3)pan.moved=true;
    cam.x=pan.cx+dx/cam.zoom;cam.y=pan.cy+dy/cam.zoom;
    draw();
  }
},{passive:false});
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++)delete touches[e.changedTouches[i].identifier];
  if(e.touches.length===0){
    if(pan&&!pan.moved){selected=null;hideCard();draw();}
    pan=null;
  }
},{passive:false});

// ── Attribute card ───────────────────────────────────────────────────────────
function showCard(n){
  var card=document.getElementById('card');
  document.getElementById('card-title').textContent=n.label||n.id;
  var attrsEl=document.getElementById('card-attrs');
  attrsEl.innerHTML='';
  if(n.label&&n.label!==n.id){
    var row=document.createElement('div');row.className='attr-row';
    row.innerHTML='<span class="attr-key">ID</span><span class="attr-val">'+n.id+'</span>';
    attrsEl.appendChild(row);
  }
  var attrs=n.attrs||{};
  var keys=Object.keys(attrs);
  if(keys.length){
    keys.forEach(function(k){
      var row=document.createElement('div');row.className='attr-row';
      var v=String(attrs[k]);
      row.innerHTML='<span class="attr-key">'+k+'</span><span class="attr-val" title="'+v.replace(/"/g,'&quot;')+'">'+v+'</span>';
      attrsEl.appendChild(row);
    });
  } else if(!n.label||n.label===n.id){
    attrsEl.innerHTML='<span style="font-size:9px;color:#505870;letter-spacing:1px">NO ATTRIBUTES</span>';
  }
  card.style.display='block';
}
function hideCard(){document.getElementById('card').style.display='none';}
document.getElementById('card-close').addEventListener('click',function(){
  selected=null;hideCard();draw();
});

// ── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click',function(){
  cam={x:initCam.x,y:initCam.y,zoom:initCam.zoom};draw();
});
document.getElementById('btn-labels').addEventListener('click',function(){
  showLabels=!showLabels;
  this.classList.toggle('active',showLabels);
  draw();
});

// ── Resize ───────────────────────────────────────────────────────────────────
var ro=new ResizeObserver(function(){
  canvas.width=canvas.offsetWidth||window.innerWidth;
  canvas.height=canvas.offsetHeight||window.innerHeight;
  draw();
});
ro.observe(canvas);
canvas.width=canvas.offsetWidth||window.innerWidth;
canvas.height=canvas.offsetHeight||window.innerHeight;
draw();
})();
</script>
</body>
</html>
